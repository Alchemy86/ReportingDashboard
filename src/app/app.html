<div class="min-h-screen bg-slate-50 text-slate-900">
  <header class="border-b border-slate-200 bg-white">
    <div class="mx-auto flex max-w-7xl items-center justify-between px-6 py-4">
      <h1 class="text-xl font-bold tracking-tight text-blue-600">{{ title() }}</h1>
      <span class="rounded-full bg-blue-50 px-3 py-1 text-sm font-medium text-blue-700">
        zoneless · signals · standalone
      </span>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-8">
    <section class="mb-8 rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <p class="text-sm font-medium text-slate-500">Reports generated</p>
      <p class="mt-1 text-4xl font-bold tabular-nums">{{ store.reportCount() }}</p>
      <button
        type="button"
        class="mt-4 rounded-lg bg-blue-600 px-4 py-2 text-sm font-semibold text-white transition hover:bg-blue-700"
        (click)="store.addReport()"
      >
        Add report
      </button>
    </section>

    <router-outlet />
  </main>
</div>
