<div class="min-h-screen bg-slate-50 text-slate-900">
  <header
    class="w-full border-b border-slate-950/60 bg-gradient-to-r from-slate-900 via-slate-800 to-indigo-900 shadow-lg shadow-slate-900/20"
  >
    <div class="mx-auto flex w-full max-w-7xl items-center justify-between gap-6 px-6 py-4">
      <div class="flex items-center gap-3">
        <span
          class="flex h-9 w-9 items-center justify-center rounded-lg bg-blue-500/90 shadow-inner"
        >
          <svg
            class="h-5 w-5 text-white"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M3 3v18h18" />
            <path d="M7 14l4-4 3 3 5-6" />
          </svg>
        </span>
        <h1 class="text-xl font-bold tracking-tight text-white">{{ title() }}</h1>
      </div>

      <div class="flex items-center gap-2">
        @if (debug.isDevBuild) {
          <button
            type="button"
            aria-label="Toggle debug panel"
            [attr.aria-pressed]="debug.showDebug()"
            (click)="debug.toggle()"
            [class]="
              debug.showDebug()
                ? 'flex h-9 w-9 items-center justify-center rounded-lg ring-1 ring-inset transition bg-blue-500/90 text-white ring-blue-300/40'
                : 'flex h-9 w-9 items-center justify-center rounded-lg ring-1 ring-inset transition text-slate-300 ring-white/15 hover:bg-white/10 hover:text-white'
            "
          >
            <svg
              class="h-5 w-5"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <path d="m8 2 1.88 1.88" />
              <path d="M14.12 3.88 16 2" />
              <path d="M9 7.13v-1a3.003 3.003 0 1 1 6 0v1" />
              <path
                d="M12 20c-3.3 0-6-2.7-6-6v-3a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v3c0 3.3-2.7 6-6 6"
              />
              <path d="M12 20v-9" />
              <path d="M6.53 9C4.6 8.8 3 7.1 3 5" />
              <path d="M6 13H2" />
              <path d="M3 21c0-2.1 1.7-3.9 3.8-4" />
              <path d="M20.97 5c0 2.1-1.6 3.8-3.5 4" />
              <path d="M22 13h-4" />
              <path d="M17.2 17c2.1.1 3.8 1.9 3.8 4" />
            </svg>
          </button>
        }
        <button
          type="button"
          aria-label="API key settings"
          (click)="openTokenModal()"
          class="flex h-9 w-9 items-center justify-center rounded-lg ring-1 ring-inset transition text-slate-300 ring-white/15 hover:bg-white/10 hover:text-white"
        >
          <svg
            class="h-5 w-5"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="3" />
            <path
              d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"
            />
          </svg>
        </button>
      </div>
    </div>
  </header>

  <main class="mx-auto max-w-7xl px-6 py-8">
    <section class="mb-4">
      <app-breadcrumbs />
    </section>

    <router-outlet />
  </main>

  @if (showTokenModal()) {
    <app-modal [isOpen]="true" (closed)="closeTokenModal()">
      <div class="token-modal">
        <h2 class="token-modal__title">API Key Settings</h2>
        <p class="token-modal__description">
          Manage your Notify API key. The key is stored locally in your browser.
        </p>
        <app-token-form
          [value]="tokenService.token()"
          (save)="onSaveToken($event)"
          (clear)="onClearToken()"
        />
      </div>
    </app-modal>
  }
</div>
