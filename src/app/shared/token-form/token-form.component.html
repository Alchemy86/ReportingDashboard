<div class="token-form">
  <label class="token-form__label" for="api-key-input">Notify API Key</label>
  <div class="token-form__input-wrapper">
    <input
      id="api-key-input"
      class="token-form__input"
      [type]="showPassword ? 'text' : 'password'"
      [value]="inputValue"
      (input)="inputValue = $any($event.target).value"
      placeholder="Enter your API key..."
      autocomplete="off"
    />
    <button
      type="button"
      class="token-form__toggle-btn"
      (click)="togglePasswordVisibility()"
      [attr.aria-label]="showPassword ? 'Hide key' : 'Show key'"
    >
      @if (showPassword) {
        <svg
          class="token-form__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"
          />
          <line x1="1" y1="1" x2="23" y2="23" />
        </svg>
      } @else {
        <svg
          class="token-form__icon"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7Z" />
          <circle cx="12" cy="12" r="3" />
        </svg>
      }
    </button>
  </div>
  <div class="token-form__actions">
    <button type="button" class="app-btn app-btn--secondary" (click)="onClear()">Clear</button>
    <button type="button" class="app-btn app-btn--primary" (click)="onSave()">Save</button>
  </div>
</div>
